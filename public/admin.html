<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Deal.pk</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0e1a; color: #ffffff; }
        .gradient-text {
            background: linear-gradient(135deg, #f97316 0%, #eab308 50%, #f97316 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-premium {
            background: linear-gradient(135deg, #f97316, #eab308);
            color: white; font-weight: 600; padding: 8px 20px;
            border-radius: 9999px; border: none; cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-premium:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(249, 115, 22, 0.3); }
        .btn-outline {
            background: transparent; color: white; font-weight: 500; padding: 8px 20px;
            border-radius: 9999px; border: 2px solid rgba(255, 255, 255, 0.15);
            cursor: pointer; transition: all 0.3s ease;
        }
        .btn-outline:hover { border-color: #f97316; color: #f97316; }
        .status-badge { padding: 2px 10px; border-radius: 9999px; font-size: 10px; font-weight: 600; }
        .status-badge.pending { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .status-badge.approved { background: rgba(16,185,129,0.2); color: #10b981; }
        .status-badge.rejected { background: rgba(239,68,68,0.2); color: #ef4444; }
        .status-badge.active { background: rgba(16,185,129,0.2); color: #10b981; }
        .tab-btn { padding: 6px 16px; border-radius: 9999px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.3s ease; background: transparent; color: rgba(255,255,255,0.6); border: 1px solid transparent; }
        .tab-btn.active { background: rgba(249,115,22,0.15); color: #f97316; border-color: rgba(249,115,22,0.3); }
        .tab-btn:hover { color: white; background: rgba(255,255,255,0.05); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; transition: all 0.3s ease; }
        .stat-card:hover { border-color: rgba(249,115,22,0.3); transform: translateY(-2px); }
    </style>
</head>
<body>
    <nav class="bg-[#1a1a2e] border-b border-white/10 px-6 py-3 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-r from-orange-500 to-yellow-500 flex items-center justify-center text-white font-bold">D</div>
                <span class="text-xl font-bold gradient-text">Deal.pk Admin</span>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-sm text-gray-400" id="adminName">Admin</span>
                <button onclick="logout()" class="text-sm text-red-400 hover:text-red-300 transition">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-6" id="adminStats">
            <div class="stat-card"><h3 class="text-gray-400 text-sm">Total Properties</h3><p class="text-2xl font-bold" id="totalProperties">0</p></div>
            <div class="stat-card"><h3 class="text-gray-400 text-sm">Pending Approval</h3><p class="text-2xl font-bold text-yellow-500" id="pendingProperties">0</p></div>
            <div class="stat-card"><h3 class="text-gray-400 text-sm">Total Users</h3><p class="text-2xl font-bold" id="totalUsers">0</p></div>
            <div class="stat-card"><h3 class="text-gray-400 text-sm">Total Revenue</h3><p class="text-2xl font-bold text-green-500" id="totalRevenue">PKR 0</p></div>
            <div class="stat-card"><h3 class="text-gray-400 text-sm">Pending KYC</h3><p class="text-2xl font-bold text-red-500" id="pendingKYC">0</p></div>
        </div>

        <div class="flex flex-wrap gap-2 mb-4">
            <button class="tab-btn active" onclick="switchTab('pending')">Pending Properties</button>
            <button class="tab-btn" onclick="switchTab('all')">All Properties</button>
            <button class="tab-btn" onclick="switchTab('users')">Users</button>
            <button class="tab-btn" onclick="switchTab('agents')">Agents</button>
            <button class="tab-btn" onclick="switchTab('agencies')">Agencies</button>
            <button class="tab-btn" onclick="switchTab('builders')">Builders</button>
            <button class="tab-btn" onclick="switchTab('bookings')">Bookings</button>
            <button class="tab-btn" onclick="switchTab('kyc')">KYC</button>
            <button class="tab-btn" onclick="switchTab('commissions')">Commissions</button>
        </div>

        <div id="pendingTab" class="tab-content active"><div id="pendingPropertiesList" class="grid gap-3"></div></div>
        <div id="allTab" class="tab-content hidden"><div id="allPropertiesList" class="grid gap-3"></div></div>
        <div id="usersTab" class="tab-content hidden"><div id="usersList" class="grid gap-3"></div></div>
        <div id="agentsTab" class="tab-content hidden"><div id="agentsList" class="grid gap-3"></div></div>
        <div id="agenciesTab" class="tab-content hidden"><div id="agenciesList" class="grid gap-3"></div></div>
        <div id="buildersTab" class="tab-content hidden"><div id="buildersList" class="grid gap-3"></div></div>
        <div id="bookingsTab" class="tab-content hidden"><div id="bookingsList" class="grid gap-3"></div></div>
        <div id="kycTab" class="tab-content hidden"><div id="kycList" class="grid gap-3"></div></div>
        <div id="commissionsTab" class="tab-content hidden"><div id="commissionsList" class="grid gap-3"></div></div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
