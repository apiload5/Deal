<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Deal.pk</title>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#0a0e1a] text-white">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold gradient-text mb-6">Admin Dashboard</h1>
        
        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6" id="adminStats">
            <div class="bg-white/5 p-4 rounded-xl">
                <h3 class="text-gray-400 text-sm">Total Properties</h3>
                <p class="text-2xl font-bold" id="totalProperties">0</p>
            </div>
            <div class="bg-white/5 p-4 rounded-xl">
                <h3 class="text-gray-400 text-sm">Pending Approval</h3>
                <p class="text-2xl font-bold text-yellow-500" id="pendingProperties">0</p>
            </div>
            <div class="bg-white/5 p-4 rounded-xl">
                <h3 class="text-gray-400 text-sm">Total Users</h3>
                <p class="text-2xl font-bold" id="totalUsers">0</p>
            </div>
            <div class="bg-white/5 p-4 rounded-xl">
                <h3 class="text-gray-400 text-sm">Revenue</h3>
                <p class="text-2xl font-bold text-green-500" id="totalRevenue">PKR 0</p>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex gap-2 mb-4">
            <button class="tab-btn active" onclick="switchTab('pending')">Pending Properties</button>
            <button class="tab-btn" onclick="switchTab('all')">All Properties</button>
            <button class="tab-btn" onclick="switchTab('users')">Users</button>
            <button class="tab-btn" onclick="switchTab('analytics')">Analytics</button>
        </div>

        <!-- Pending Properties -->
        <div id="pendingTab" class="tab-content active">
            <div id="pendingPropertiesList" class="grid gap-4"></div>
        </div>

        <!-- All Properties -->
        <div id="allTab" class="tab-content hidden">
            <div id="allPropertiesList" class="grid gap-4"></div>
        </div>

        <!-- Users -->
        <div id="usersTab" class="tab-content hidden">
            <div id="usersList" class="grid gap-4"></div>
        </div>

        <!-- Analytics -->
        <div id="analyticsTab" class="tab-content hidden">
            <canvas id="revenueChart" class="w-full max-h-80"></canvas>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
